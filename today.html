<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's Games — March Madness 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #E8520A;
  --gold: #F5C842;
  --dark: #0A0A0A;
  --dark2: #141414;
  --dark3: #1C1C1C;
  --dark4: #262626;
  --mid: #383838;
  --muted: #666;
  --light: #D8D8D0;
  --white: #F0F0EB;
  --green: #27AE60;
  --green2: #2ECC71;

  --cbs:   #0056A2;
  --tnt:   #C8102E;
  --tbs:   #006BB6;
  --trutv: #6A1A8C;

  --c-robert:  #3B8BEB;
  --c-ernesto: #E8520A;
  --c-efren:   #2ECC71;
  --c-james:   #9B59B6;
  --c-antonio: #F5C842;
  --c-luisc:   #E74C3C;
  --c-arturo:  #1ABC9C;
  --c-albert:  #E67E22;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--dark);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
}

/* HEADER */
.site-header {
  background: var(--dark2);
  border-bottom: 1px solid var(--dark4);
  padding: 0 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; position: sticky; top: 0; z-index: 100;
}
.site-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
}
.site-title span { color: var(--orange); }
.nav-links { display: flex; gap: 12px; align-items: center; }
.nav-link {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  text-decoration: none; transition: color 0.15s;
}
.nav-link:hover { color: var(--orange); }
.sync-dot.live { background: var(--green2) !important; }
.sync-dot { transition: background 0.3s; }
.sync-dot.live { background: var(--green2) !important; }

/* HERO */
.hero {
  background: var(--dark2);
  border-bottom: 1px solid var(--dark4);
  padding: 2rem 1.5rem 1.5rem;
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -55deg,
    transparent, transparent 40px,
    rgba(232,82,10,0.03) 40px, rgba(232,82,10,0.03) 41px
  );
}
.hero-inner { position: relative; max-width: 1100px; margin: 0 auto; }
.hero-date {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--orange);
  margin-bottom: 8px;
}
.hero-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: clamp(36px, 6vw, 64px);
  font-weight: 900; letter-spacing: -0.01em; text-transform: uppercase;
  line-height: 0.95; margin-bottom: 14px;
}
.hero-title em { color: var(--orange); font-style: normal; }
.hero-sub {
  font-size: 14px; color: var(--muted); display: flex; gap: 20px; flex-wrap: wrap;
}
.hero-sub span { display: flex; align-items: center; gap: 5px; }
.hero-sub span::before { content: '·'; color: var(--dark4); }
.hero-sub span:first-child::before { display: none; }

/* COUNTDOWN */
.countdown-bar {
  background: var(--dark3); border-bottom: 1px solid var(--dark4);
  padding: 10px 1.5rem; display: flex; align-items: center; gap: 16px;
}
.countdown-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
.countdown-time {
  font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800;
  color: var(--gold); letter-spacing: 0.04em;
}
.live-pill {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--green); color: #fff; padding: 3px 10px; border-radius: 20px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* MAIN */
.main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

/* TIME BLOCK HEADERS */
.time-block { margin-bottom: 2.5rem; }
.time-block-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 1rem;
}
.time-block-time {
  font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.04em; color: var(--white);
}
.time-block-line { flex: 1; height: 1px; background: var(--dark4); }
.time-block-status {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 20px;
}
.status-upcoming { background: var(--dark4); color: var(--muted); }
.status-live { background: var(--green); color: #fff; animation: pulse 1.5s ease-in-out infinite; }
.status-final { background: var(--dark3); color: var(--muted); border: 1px solid var(--dark4); }

/* GAMES GRID */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}

/* GAME CARD */
.game-card {
  background: var(--dark2);
  border: 1px solid var(--dark4);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
  position: relative;
}
.game-card:hover { border-color: var(--mid); transform: translateY(-1px); }
.game-card.has-stake { border-color: var(--dark4); }
.game-card.has-stake::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}

/* Network color accent */
.game-card.net-cbs::before   { background: var(--cbs); }
.game-card.net-tnt::before   { background: var(--tnt); }
.game-card.net-tbs::before   { background: var(--tbs); }
.game-card.net-trutv::before { background: var(--trutv); }

.game-card-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px 9px 17px;
  border-bottom: 1px solid var(--dark4);
  background: var(--dark3);
}
.game-region {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
.game-meta { display: flex; align-items: center; gap: 8px; }
.network-badge {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800;
  letter-spacing: 0.06em; padding: 2px 7px; border-radius: 3px; color: #fff;
}
.net-cbs-bg   { background: var(--cbs); }
.net-tnt-bg   { background: var(--tnt); }
.net-tbs-bg   { background: var(--tbs); }
.net-trutv-bg { background: var(--trutv); }

.game-body { padding: 4px 0; }

/* TEAM ROW */
.team-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px 9px 17px;
  position: relative;
  transition: background 0.1s;
}
.team-row:first-child { border-bottom: 1px solid var(--dark4); }
.team-row.has-owner::after {
  content: '';
  position: absolute; top: 0; bottom: 0; left: 0; width: 3px;
  border-radius: 0;
}

.seed-num {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--muted); width: 20px; text-align: center; flex-shrink: 0;
}
.team-details { flex: 1; min-width: 0; }
.team-nm {
  font-size: 15px; font-weight: 500; color: var(--white);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.team-owner-row {
  display: flex; align-items: center; gap: 5px; margin-top: 2px;
}
.owner-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.owner-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.no-owner-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  color: var(--muted); letter-spacing: 0.04em;
}

.vs-divider {
  text-align: center; font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--dark4);
  line-height: 1; padding: 1px 0;
}

/* STAKE INDICATOR */
.stake-bar {
  padding: 7px 14px 7px 17px;
  border-top: 1px solid var(--dark4);
  background: var(--dark3);
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.stake-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  flex-shrink: 0;
}
.stake-chip {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 12px; background: var(--dark4); color: var(--light);
}

/* LEGEND */
.legend {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 10px 1rem; margin-bottom: 1.5rem;
  background: var(--dark2); border: 1px solid var(--dark4); border-radius: 6px;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }
.legend-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
}

/* NETWORK LEGEND */
.net-legend {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem;
}
.net-leg-item {
  display: flex; align-items: center; gap: 5px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
}

@media (max-width: 500px) {
  .hero { padding: 1.5rem 1rem 1.2rem; }
  .site-header { padding: 0 1rem; }
  .games-grid { grid-template-columns: 1fr; }
}
</style>

const app = initializeApp(FIREBASE_CONFIG, 'today-app');
const db  = getDatabase(app);

let winsData = {};
let elimData = {};

onValue(ref(db, 'tracker2026'), (snapshot) => {
  const data = snapshot.val();
  if (data) { winsData = data.winsData || {}; elimData = data.elimData || {}; }
  setSyncStatus('live');
  render();
}, () => setSyncStatus('error'));

function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot) return;
  dot.className = 'sync-dot' + (s === 'live' ? ' live' : '');
  lbl.textContent = s === 'live' ? 'Live' : 'Offline';
}

// ── TEAM KEY (must match tracker's format) ───────────────────────────────
function teamKey(name, seed, region) {
  return `${region}_${seed}_${name.replace(/[^a-zA-Z0-9]/g,'_')}`;
}
function getWins(name, seed, region) { return winsData[teamKey(name, seed, region)] || 0; }
function isElim(name, seed, region)  { return !!elimData[teamKey(name, seed, region)]; }

// Determine winner of a matchup: the team with more wins wins,
// or if both are elim'd the one NOT elim'd, or if one has wins.
// Simply: winner = team that has wins > 0 AND other team is eliminated,
// OR team with higher wins when both have some.
function getMatchResult(gameWithRegion) {
  const { teamA, teamB, region } = gameWithRegion;
  const wA = getWins(teamA.name, teamA.seed, region);
  const wB = getWins(teamB.name, teamB.seed, region);
  const eA = isElim(teamA.name, teamA.seed, region);
  const eB = isElim(teamB.name, teamB.seed, region);

  // If neither has data yet, no result
  if (!eA && !eB && wA === 0 && wB === 0) return null;

  // Winner is the non-eliminated one, or the one with wins
  if (eA && !eB) return { winner: 'B', loser: 'A' };
  if (eB && !eA) return { winner: 'A', loser: 'B' };
  if (wA > 0 && wB === 0) return { winner: 'A', loser: 'B' };
  if (wB > 0 && wA === 0) return { winner: 'B', loser: 'A' };
  if (wA > wB) return { winner: 'A', loser: 'B' };
  if (wB > wA) return { winner: 'B', loser: 'A' };
  return null;
}

// ── STATIC DATA ───────────────────────────────────────────────────────────
const PLAYER_COLORS = {
  'Robert':  '#3B8BEB', 'Ernesto': '#E8520A', 'Efren':   '#2ECC71',

const OWNERS = {

  'Louisville|6':'James',  'Kansas|4':'James',        'Houston|2':'James',
  'Troy|13':'James',       'LIU|16':'James',
  'Northern Iowa|12':'Antonio','Texas A&M|10':'Antonio','Saint Louis|9':'Antonio',
  'BYU|6':'Antonio',       'Nebraska|4':'Antonio',    'Wisconsin|5':'Antonio',
  'Florida|1':'Antonio',   'Tennessee St.|15':'Antonio',
  'Miami (OH)|11':'Luis C','Santa Clara|10':'Luis C', 'TCU|9':'Luis C',
  'UCLA|7':'Luis C',       'Gonzaga|3':'Luis C',      'Vanderbilt|5':'Luis C',
  'Michigan|1':'Luis C',   'Queens|15':'Luis C',
  'South Florida|11':'Arturo','Missouri|10':'Arturo', 'Utah St.|9':'Arturo',
  "Saint Mary's|7":'Arturo','Illinois|3':'Arturo',   'Texas Tech|5':'Arturo',
  'Kennesaw St.|14':'Arturo','Idaho|15':'Arturo',
  'Texas|11':'Albert',     'VCU|11':'Albert',         'Kentucky|7':'Albert',
  'Miami (FL)|7':'Albert', 'Michigan St.|3':'Albert', 'Virginia|3':'Albert',
  'Wright St.|14':'Albert','Furman|15':'Albert',
};

function getOwner(name, seed) { return OWNERS[`${name}|${seed}`] || null; }

const GAMES = [
  { time:'12:15 PM', net:'CBS',   region:'East',    teamA:{seed:8,  name:'Ohio St.'},       teamB:{seed:9,  name:'TCU'} },
  { time:'12:40 PM', net:'truTV', region:'South',   teamA:{seed:4,  name:'Nebraska'},        teamB:{seed:13, name:'Troy'} },

// ── HELPERS ───────────────────────────────────────────────────────────────
function netClass(net)   { return 'net-' + net.toLowerCase().replace('/','').replace(' ',''); }
function netBgClass(net) { return netClass(net) + '-bg'; }

function parseTimeET(timeStr) {
  const [time, period] = timeStr.split(' ');
  let [h, m] = time.split(':').map(Number);
  if (period === 'PM' && h !== 12) h += 12;
  if (period === 'AM' && h === 12) h = 0;
  const now = new Date();
  return new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), h + 4, m));
}

function getGameStatus(timeStr) {
  const diff = parseTimeET(timeStr) - new Date();
  if (diff > 0) return 'upcoming';
  if (diff > -150 * 60 * 1000) return 'live';
  return 'final';
}

function isPM6orLater(timeStr) {
  const h = parseInt(timeStr);
  return timeStr.includes('PM') && h >= 6 && h !== 12;
}

// ── RENDER TEAM ROW ───────────────────────────────────────────────────────
function renderTeam(team, region, result, side) {
  const owner = getOwner(team.name, team.seed);
  const color = owner ? PLAYER_COLORS[owner] : null;
  const wins  = getWins(team.name, team.seed, region);
  const pts   = team.seed * wins;

  const isWinner = result && result.winner === side;
  const isLoser  = result && result.loser  === side;

  let rowStyle = '';
  let overlayHTML = '';
  let nameStyle = '';
  let seedStyle = '';

  if (isWinner) {
    rowStyle = `background: linear-gradient(90deg, ${color ? color+'18' : '#ffffff0a'} 0%, transparent 100%); border-left: 3px solid ${color || 'var(--green)'}; padding-left: 14px;`;
    nameStyle = 'font-weight:600;';
    overlayHTML = `<div style="display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;background:var(--green);color:#fff;padding:2px 8px;border-radius:12px">WIN</span>
      ${pts > 0 ? `<span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:var(--gold)">+${pts}pts</span>` : ''}
    </div>`;
  } else if (isLoser) {
    rowStyle = 'opacity:0.38; border-left:3px solid var(--dark4); padding-left:14px; text-decoration:none;';
    nameStyle = 'text-decoration:line-through; color:var(--muted);';
    overlayHTML = `<span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-left:auto;flex-shrink:0">OUT</span>`;
  } else if (owner) {
    rowStyle = `border-left: 3px solid ${color}; padding-left: 14px;`;
  }

  // Winner player celebration
  let winnerBannerHTML = '';
  if (isWinner && owner) {
    winnerBannerHTML = `<div style="background:${color}18;border-top:1px solid ${color}33;padding:6px 14px 6px 17px;display:flex;align-items:center;gap:7px">
      <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:${color}">${owner} advances! +${pts} pts</span>
      <span style="font-size:14px;margin-left:2px">🎉</span>
    </div>`;
  }

  return `
    <div class="team-row" style="${rowStyle}">
      <div class="seed-num" style="${isLoser?'color:var(--muted)':''}">${team.seed}</div>
      <div class="team-details">
        <div class="team-nm" style="${nameStyle}">${team.name}</div>
        <div class="team-owner-row">
          ${owner
            ? `<div class="owner-dot" style="background:${isLoser?'var(--muted)':color}"></div>
               <span class="owner-label" style="color:${isLoser?'var(--muted)':color}">${owner}</span>`
            : `<span class="no-owner-label">Undrafted</span>`}
        </div>
      </div>
      ${overlayHTML}
    </div>
    ${winnerBannerHTML}`;
}

// ── RENDER GAME CARD ──────────────────────────────────────────────────────
function renderGame(game) {
  const ownerA  = getOwner(game.teamA.name, game.teamA.seed);
  const ownerB  = getOwner(game.teamB.name, game.teamB.seed);
  const stakes  = [ownerA, ownerB].filter(Boolean);
  const hasStake = stakes.length > 0;
  const status  = getGameStatus(game.time);
  const result  = getMatchResult(game);
  const isFinal = result !== null;

  // Card border glow for finished games with a drafted winner
  const winnerOwner = result
    ? (result.winner === 'A' ? ownerA : ownerB)
    : null;
  const winnerColor = winnerOwner ? PLAYER_COLORS[winnerOwner] : null;

  let cardBorderStyle = '';
  if (isFinal && winnerColor) {
    cardBorderStyle = ` style="border-color:${winnerColor}55;"`;
  }

  const statusTag = status === 'live'
    ? `<span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;background:var(--green);color:#fff;padding:2px 8px;border-radius:10px;animation:pulse 1.5s infinite">LIVE</span>`
    : isFinal
    ? `<span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:var(--dark4);color:var(--muted);padding:2px 8px;border-radius:10px">FINAL</span>`
    : `<span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">${game.time} ET</span>`;

  return `<div class="game-card ${netClass(game.net)}"${cardBorderStyle}>
    <div class="game-card-top">
      <div class="game-region">${game.region} Region</div>
      <div class="game-meta">
        ${statusTag}
        <span class="network-badge ${netBgClass(game.net)}">${game.net}</span>
      </div>
    </div>
    <div class="game-body">
      ${renderTeam(game.teamA, game.region, result, 'A')}
      <div class="vs-divider">${isFinal ? 'FINAL' : 'VS'}</div>
      ${renderTeam(game.teamB, game.region, result, 'B')}
    </div>
    ${!isFinal && hasStake ? `<div class="stake-bar">
      <span class="stake-label">Your teams</span>
      ${stakes.map(o => `<span class="stake-chip" style="background:${PLAYER_COLORS[o]}22;color:${PLAYER_COLORS[o]};border:1px solid ${PLAYER_COLORS[o]}44">${o}</span>`).join('')}
    </div>` : ''}
  </div>`;
}

// ── RENDER PAGE ───────────────────────────────────────────────────────────
function render() {
  document.getElementById('player-legend').innerHTML =
    Object.entries(PLAYER_COLORS).map(([name, color]) =>
      `<div class="legend-item">
        <div class="legend-dot" style="background:${color}"></div>
        <span class="legend-name" style="color:${color}">${name}</span>
      </div>`
    ).join('');

  const afternoon = GAMES.filter(g => !isPM6orLater(g.time));
  const evening   = GAMES.filter(g =>  isPM6orLater(g.time));

  document.getElementById('games-container').innerHTML =
    renderTimeBlock('Afternoon Games', '12:15 PM – 5:00 PM ET', afternoon) +
    renderTimeBlock('Evening Games',   '6:50 PM – Late ET',     evening);
}

function renderTimeBlock(title, subtitle, games) {
  const firstStatus = games.length ? getGameStatus(games[0].time) : 'upcoming';
  const lastStatus  = games.length ? getGameStatus(games[games.length-1].time) : 'upcoming';
  let blockStatus = 'upcoming';
  if (lastStatus === 'final') {
    const allFinal = games.every(g => getMatchResult(g) !== null || getGameStatus(g.time) === 'final');
    blockStatus = allFinal ? 'final' : 'live';
  } else if (firstStatus !== 'upcoming') blockStatus = 'live';

  const finishedCount = games.filter(g => getMatchResult(g) !== null).length;

  const statusHTML = blockStatus === 'live'
    ? `<span class="time-block-status status-live">Live</span>`
    : blockStatus === 'final'
    ? `<span class="time-block-status status-final">Final — ${finishedCount}/${games.length} complete</span>`
    : `<span class="time-block-status status-upcoming">Upcoming</span>`;

  return `<div class="time-block">
    <div class="time-block-header">
      <div>
        <div class="time-block-time">${title}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${subtitle}</div>
      </div>
      <div class="time-block-line"></div>
      ${statusHTML}
    </div>
    <div class="games-grid">${games.map(renderGame).join('')}</div>
  </div>`;
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────
function updateCountdown() {
  const firstTip = parseTimeET('12:15 PM');
  const diff = firstTip - new Date();
  const timeEl   = document.getElementById('countdown-time');
  const statusEl = document.getElementById('countdown-status');
  const bar      = document.getElementById('countdown-bar');
  if (diff <= 0) {
    timeEl.textContent = 'Games are underway!';
    statusEl.innerHTML = '<div class="live-pill">Live</div>';
    bar.style.background = '#0f1f0f';
    return;
  }
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  timeEl.textContent = h > 0
    ? `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`
    : `${m}m ${String(s).padStart(2,'0')}s`;
  statusEl.innerHTML = `<span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Until tip-off</span>`;
}

// Firebase onValue drives render() — just run countdown timer independently
setInterval(updateCountdown, 1000);
// Initial render with empty data while Firebase loads
render();
updateCountdown();
</script>
</body>
</html>
