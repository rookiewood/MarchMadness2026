<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's Games — March Madness 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #E8520A;
  --gold: #F5C842;
  --dark: #0A0A0A;
  --dark2: #141414;
  --dark3: #1C1C1C;
  --dark4: #262626;
  --mid: #383838;
  --muted: #666;
  --light: #D8D8D0;
  --white: #F0F0EB;
  --green: #27AE60;
  --green2: #2ECC71;

  --cbs:   #0056A2;
  --tnt:   #C8102E;
  --tbs:   #006BB6;
  --trutv: #6A1A8C;

  --c-robert:  #3B8BEB;
  --c-ernesto: #E8520A;
  --c-efren:   #2ECC71;
  --c-james:   #9B59B6;
  --c-antonio: #F5C842;
  --c-luisc:   #E74C3C;
  --c-arturo:  #1ABC9C;
  --c-albert:  #E67E22;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--dark);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
}

/* HEADER */
.site-header {
  background: var(--dark2);
  border-bottom: 1px solid var(--dark4);
  padding: 0 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; position: sticky; top: 0; z-index: 100;
}
.site-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
}
.site-title span { color: var(--orange); }
.nav-links { display: flex; gap: 12px; align-items: center; }
.nav-link {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  text-decoration: none; transition: color 0.15s;
}
.nav-link:hover { color: var(--orange); }

/* HERO */
.hero {
  background: var(--dark2);
  border-bottom: 1px solid var(--dark4);
  padding: 2rem 1.5rem 1.5rem;
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -55deg,
    transparent, transparent 40px,
    rgba(232,82,10,0.03) 40px, rgba(232,82,10,0.03) 41px
  );
}
.hero-inner { position: relative; max-width: 1100px; margin: 0 auto; }
.hero-date {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--orange);
  margin-bottom: 8px;
}
.hero-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: clamp(36px, 6vw, 64px);
  font-weight: 900; letter-spacing: -0.01em; text-transform: uppercase;
  line-height: 0.95; margin-bottom: 14px;
}
.hero-title em { color: var(--orange); font-style: normal; }
.hero-sub {
  font-size: 14px; color: var(--muted); display: flex; gap: 20px; flex-wrap: wrap;
}
.hero-sub span { display: flex; align-items: center; gap: 5px; }
.hero-sub span::before { content: '·'; color: var(--dark4); }
.hero-sub span:first-child::before { display: none; }

/* COUNTDOWN */
.countdown-bar {
  background: var(--dark3); border-bottom: 1px solid var(--dark4);
  padding: 10px 1.5rem; display: flex; align-items: center; gap: 16px;
}
.countdown-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
.countdown-time {
  font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800;
  color: var(--gold); letter-spacing: 0.04em;
}
.live-pill {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--green); color: #fff; padding: 3px 10px; border-radius: 20px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* MAIN */
.main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

/* TIME BLOCK HEADERS */
.time-block { margin-bottom: 2.5rem; }
.time-block-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 1rem;
}
.time-block-time {
  font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.04em; color: var(--white);
}
.time-block-line { flex: 1; height: 1px; background: var(--dark4); }
.time-block-status {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 20px;
}
.status-upcoming { background: var(--dark4); color: var(--muted); }
.status-live { background: var(--green); color: #fff; animation: pulse 1.5s ease-in-out infinite; }
.status-final { background: var(--dark3); color: var(--muted); border: 1px solid var(--dark4); }

/* GAMES GRID */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}

/* GAME CARD */
.game-card {
  background: var(--dark2);
  border: 1px solid var(--dark4);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
  position: relative;
}
.game-card:hover { border-color: var(--mid); transform: translateY(-1px); }
.game-card.has-stake { border-color: var(--dark4); }
.game-card.has-stake::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}

/* Network color accent */
.game-card.net-cbs::before   { background: var(--cbs); }
.game-card.net-tnt::before   { background: var(--tnt); }
.game-card.net-tbs::before   { background: var(--tbs); }
.game-card.net-trutv::before { background: var(--trutv); }

.game-card-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px 9px 17px;
  border-bottom: 1px solid var(--dark4);
  background: var(--dark3);
}
.game-region {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
.game-meta { display: flex; align-items: center; gap: 8px; }
.network-badge {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800;
  letter-spacing: 0.06em; padding: 2px 7px; border-radius: 3px; color: #fff;
}
.net-cbs-bg   { background: var(--cbs); }
.net-tnt-bg   { background: var(--tnt); }
.net-tbs-bg   { background: var(--tbs); }
.net-trutv-bg { background: var(--trutv); }

.game-body { padding: 4px 0; }

/* TEAM ROW */
.team-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px 9px 17px;
  position: relative;
  transition: background 0.1s;
}
.team-row:first-child { border-bottom: 1px solid var(--dark4); }
.team-row.has-owner::after {
  content: '';
  position: absolute; top: 0; bottom: 0; left: 0; width: 3px;
  border-radius: 0;
}

.seed-num {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--muted); width: 20px; text-align: center; flex-shrink: 0;
}
.team-details { flex: 1; min-width: 0; }
.team-nm {
  font-size: 15px; font-weight: 500; color: var(--white);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.team-owner-row {
  display: flex; align-items: center; gap: 5px; margin-top: 2px;
}
.owner-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.owner-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.no-owner-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  color: var(--muted); letter-spacing: 0.04em;
}

.vs-divider {
  text-align: center; font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--dark4);
  line-height: 1; padding: 1px 0;
}

/* STAKE INDICATOR */
.stake-bar {
  padding: 7px 14px 7px 17px;
  border-top: 1px solid var(--dark4);
  background: var(--dark3);
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.stake-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  flex-shrink: 0;
}
.stake-chip {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 12px; background: var(--dark4); color: var(--light);
}

/* LEGEND */
.legend {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 10px 1rem; margin-bottom: 1.5rem;
  background: var(--dark2); border: 1px solid var(--dark4); border-radius: 6px;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }
.legend-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
}

/* NETWORK LEGEND */
.net-legend {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem;
}
.net-leg-item {
  display: flex; align-items: center; gap: 5px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
}

@media (max-width: 500px) {
  .hero { padding: 1.5rem 1rem 1.2rem; }
  .site-header { padding: 0 1rem; }
  .games-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-title">March <span>Madness</span> 2026</div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Tracker</a>
    <a href="bracket.html" class="nav-link">Bracket</a>
    <a href="draft.html" class="nav-link">Draft</a>

</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-date">Thursday, March 19, 2026 · First Round · Round of 64</div>
    <div class="hero-title">Today's<br><em>16 Games</em></div>
    <div class="hero-sub">
      <span>Buffalo, NY</span>

      <span>Oklahoma City, OK</span>

</div>

  <div class="countdown-label">First tip-off</div>

  <div id="countdown-status"></div>
</div>

<div class="main">

  <div class="legend" id="player-legend"></div>

  <div id="games-container"></div>

</div>

<script>
const PLAYER_COLORS = {
  'Robert':  '#3B8BEB',
  'Ernesto': '#E8520A',
  'Efren':   '#2ECC71',
  'James':   '#9B59B6',
  'Antonio': '#F5C842',
  'Luis C':  '#E74C3C',
  'Arturo':  '#1ABC9C',
  'Albert':  '#E67E22'
};

// owner lookup: "TeamName|seed" → owner
const OWNERS = {
  'Duke|1':             'Robert',
  'Iowa St.|2':        'Robert',
  'Arizona|1':         'Robert',
  'Purdue|2':          'Robert',
  "St. John's|5":      'Robert',
  'Penn|14':           'Robert',
  'North Dakota St.|14': 'Robert',
  'Howard|16':    'Robert',

  'Akron|12':          'Ernesto',
  'Georgia|8':         'Ernesto',
  'Ohio St.|8':        'Ernesto',
  'Tennessee|6':       'Ernesto',
  'Alabama|4':         'Ernesto',
  'Cal Baptist|13':    'Ernesto',
  'Hawaii|13':         'Ernesto',
  'Siena|16':          'Ernesto',

  'High Point|12':     'Efren',
  'Clemson|8':         'Efren',
  'Villanova|8':       'Efren',
  'North Carolina|6':  'Efren',
  'Arkansas|4':        'Efren',
  'UConn|2':           'Efren',
  'Hofstra|13':        'Efren',
  'Prairie View A&M|16': 'Efren',

  'McNeese|12':        'James',
  'UCF|10':            'James',
  'Iowa|9':            'James',
  'Louisville|6':      'James',
  'Kansas|4':          'James',
  'Houston|2':         'James',
  'Troy|13':           'James',
  'LIU|16':            'James',

  'Northern Iowa|12':  'Antonio',
  'Texas A&M|10':      'Antonio',
  'Saint Louis|9':     'Antonio',
  'BYU|6':             'Antonio',
  'Nebraska|4':        'Antonio',
  'Wisconsin|5':       'Antonio',
  'Florida|1':         'Antonio',
  'Tennessee St.|15':  'Antonio',

  'Miami (OH)|11': 'Luis C',
  'Santa Clara|10':    'Luis C',
  'TCU|9':             'Luis C',
  'UCLA|7':            'Luis C',
  'Gonzaga|3':         'Luis C',
  'Vanderbilt|5':      'Luis C',
  'Michigan|1':        'Luis C',
  'Queens|15':         'Luis C',

  'South Florida|11':  'Arturo',
  'Missouri|10':       'Arturo',
  'Utah St.|9':        'Arturo',
  "Saint Mary's|7":    'Arturo',
  'Illinois|3':        'Arturo',
  'Texas Tech|5':      'Arturo',
  'Kennesaw St.|14':   'Arturo',
  'Idaho|15':          'Arturo',

  'Texas|11': 'Albert',
  'VCU|11':            'Albert',
  'Kentucky|7':        'Albert',
  'Miami (FL)|7':      'Albert',
  'Michigan St.|3':    'Albert',
  'Virginia|3':        'Albert',
  'Wright St.|14':     'Albert',
  'Furman|15':         'Albert',
};

function getOwner(name, seed) {
  return OWNERS[`${name}|${seed}`] || null;
}

// All 16 games today with real times and networks
const GAMES = [
  // 12:15 PM slot
  { time:'12:15 PM', net:'CBS',   region:'East',    teamA:{seed:8,  name:'Ohio St.'},      teamB:{seed:9,  name:'TCU'} },
  { time:'12:40 PM', net:'truTV', region:'South',   teamA:{seed:4,  name:'Nebraska'},       teamB:{seed:13, name:'Troy'} },
  { time:'1:30 PM',  net:'TNT',   region:'East',    teamA:{seed:6,  name:'Louisville'},     teamB:{seed:11, name:'South Florida'} },
  { time:'1:50 PM',  net:'TBS',   region:'West',    teamA:{seed:5,  name:'Wisconsin'},      teamB:{seed:12, name:'High Point'} },
  { time:'2:50 PM',  net:'CBS',   region:'East',    teamA:{seed:1,  name:'Duke'},           teamB:{seed:16, name:'Siena'} },
  { time:'3:15 PM',  net:'truTV', region:'South',   teamA:{seed:5,  name:'Vanderbilt'},     teamB:{seed:12, name:'McNeese'} },
  { time:'4:05 PM',  net:'TNT',   region:'East',    teamA:{seed:3,  name:'Michigan St.'},   teamB:{seed:14, name:'North Dakota St.'} },
  { time:'4:25 PM',  net:'TBS',   region:'West',    teamA:{seed:4,  name:'Arkansas'},       teamB:{seed:13, name:'Hawaii'} },
  // Evening
  { time:'6:50 PM',  net:'TNT',   region:'South',   teamA:{seed:6,  name:'North Carolina'}, teamB:{seed:11, name:'VCU'} },
  { time:'7:10 PM',  net:'CBS',   region:'Midwest', teamA:{seed:1,  name:'Michigan'},       teamB:{seed:16, name:'Howard'} },
  { time:'7:25 PM',  net:'TBS',   region:'West',    teamA:{seed:6,  name:'BYU'},            teamB:{seed:11, name:'Texas'} },
  { time:'7:35 PM',  net:'truTV', region:'South',   teamA:{seed:7,  name:"Saint Mary's"},   teamB:{seed:10, name:'Texas A&M'} },
  { time:'9:20 PM',  net:'TNT',   region:'South',   teamA:{seed:3,  name:'Illinois'},       teamB:{seed:14, name:'Penn'} },
  { time:'9:40 PM',  net:'CBS',   region:'East',    teamA:{seed:7,  name:'UCLA'},           teamB:{seed:10, name:'UCF'} },
  { time:'9:55 PM',  net:'TBS',   region:'Midwest', teamA:{seed:5,  name:'Texas Tech'},     teamB:{seed:12, name:'Akron'} },
  { time:'10:10 PM', net:'truTV', region:'West',    teamA:{seed:7,  name:'Miami (FL)'},     teamB:{seed:10, name:'Missouri'} },
];

function netClass(net) {
  return 'net-' + net.toLowerCase().replace('/','').replace(' ','');
}
function netBgClass(net) {
  return 'net-' + net.toLowerCase().replace('/','').replace(' ','') + '-bg';
}

function parseTimeET(timeStr) {
  // Returns a Date object for today at the given ET time
  const [time, period] = timeStr.split(' ');
  let [h, m] = time.split(':').map(Number);
  if (period === 'PM' && h !== 12) h += 12;
  if (period === 'AM' && h === 12) h = 0;
  // ET offset: currently EDT = UTC-4
  const now = new Date();
  const d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), h + 4, m));
  return d;
}

function getGameStatus(timeStr) {
  const gameTime = parseTimeET(timeStr);
  const now = new Date();
  const diff = gameTime - now;
  if (diff > 0) return 'upcoming';
  // assume games last ~2.5 hours
  if (diff > -150 * 60 * 1000) return 'live';
  return 'final';
}

function groupByTime(games) {
  const groups = {};
  games.forEach(g => {
    if (!groups[g.time]) groups[g.time] = [];
    groups[g.time].push(g);
  });
  return groups;
}

function renderTeam(team) {
  const owner = getOwner(team.name, team.seed);
  const color = owner ? PLAYER_COLORS[owner] : null;
  return `<div class="team-row${owner ? ' has-owner' : ''}"${owner ? ` style="border-left: 3px solid ${color}; padding-left: 14px;"` : ''}>
    <div class="seed-num">${team.seed}</div>
    <div class="team-details">
      <div class="team-nm">${team.name}</div>
      <div class="team-owner-row">
        ${owner
          ? `<div class="owner-dot" style="background:${color}"></div>
             <span class="owner-label" style="color:${color}">${owner}</span>`
          : `<span class="no-owner-label">Undrafted</span>`
        }
      </div>
    </div>
  </div>`;
}

function renderGame(game) {
  const ownerA = getOwner(game.teamA.name, game.teamA.seed);
  const ownerB = getOwner(game.teamB.name, game.teamB.seed);
  const stakes = [ownerA, ownerB].filter(Boolean);
  const hasStake = stakes.length > 0;
  const status = getGameStatus(game.time);

  return `<div class="game-card ${netClass(game.net)}${hasStake ? ' has-stake' : ''}">
    <div class="game-card-top">
      <div class="game-region">${game.region} Region</div>
      <div class="game-meta">
        <span class="network-badge ${netBgClass(game.net)}">${game.net}</span>
      </div>
    </div>
    <div class="game-body">
      ${renderTeam(game.teamA)}
      <div class="vs-divider">VS</div>
      ${renderTeam(game.teamB)}
    </div>
    ${hasStake ? `<div class="stake-bar">
      <span class="stake-label">Your teams</span>
      ${stakes.map(o => `<span class="stake-chip" style="background:${PLAYER_COLORS[o]}22;color:${PLAYER_COLORS[o]};border:1px solid ${PLAYER_COLORS[o]}44">${o}</span>`).join('')}
    </div>` : ''}
  </div>`;
}

function render() {
  // Legend
  document.getElementById('player-legend').innerHTML =
    Object.entries(PLAYER_COLORS).map(([name, color]) =>
      `<div class="legend-item">
        <div class="legend-dot" style="background:${color}"></div>
        <span class="legend-name" style="color:${color}">${name}</span>
      </div>`
    ).join('');

  // Group games by time slot (afternoon / evening)
  // Split afternoon (12pm-5pm) vs evening (6pm+)
  // Parse hour correctly: "12:15 PM" -> 12, "1:30 PM" -> 1, "6:50 PM" -> 6
  function isPM6orLater(timeStr) {
    const h = parseInt(timeStr);
    return timeStr.includes('PM') && h >= 6 && h !== 12;
  }
  const afternoon = GAMES.filter(g => !isPM6orLater(g.time));
  const evening   = GAMES.filter(g =>  isPM6orLater(g.time));

  const container = document.getElementById('games-container');
  container.innerHTML = `
    ${renderTimeBlock('Afternoon Games', '12:15 PM – 5:00 PM ET', afternoon)}
    ${renderTimeBlock('Evening Games',   '6:50 PM – Late ET',     evening)}
  `;
}

function renderTimeBlock(title, subtitle, games) {
  // Determine block status from first game
  const firstStatus = games.length ? getGameStatus(games[0].time) : 'upcoming';
  const lastStatus  = games.length ? getGameStatus(games[games.length-1].time) : 'upcoming';
  let blockStatus = 'upcoming';
  if (lastStatus === 'final') blockStatus = 'final';
  else if (firstStatus === 'live' || firstStatus === 'final') blockStatus = 'live';

  const statusHTML = blockStatus === 'live'
    ? '<span class="time-block-status status-live">Live Now</span>'
    : blockStatus === 'final'
    ? '<span class="time-block-status status-final">Final</span>'
    : '<span class="time-block-status status-upcoming">Upcoming</span>';

  return `<div class="time-block">
    <div class="time-block-header">
      <div>
        <div class="time-block-time">${title}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${subtitle}</div>
      </div>
      <div class="time-block-line"></div>
      ${statusHTML}
    </div>
    <div class="games-grid">
      ${games.map(renderGame).join('')}
    </div>
  </div>`;
}

// Countdown to first tip-off
function updateCountdown() {
  const firstTip = parseTimeET('12:15 PM');
  const now = new Date();
  const diff = firstTip - now;
  const bar = document.getElementById('countdown-bar');
  const statusEl = document.getElementById('countdown-status');
  const timeEl = document.getElementById('countdown-time');

  if (diff <= 0) {
    timeEl.textContent = 'Games are underway!';
    statusEl.innerHTML = '<div class="live-pill">Live</div>';
    bar.style.background = '#0f1f0f';
    return;
  }
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  timeEl.textContent = h > 0
    ? `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`
    : `${m}m ${String(s).padStart(2,'0')}s`;
  statusEl.innerHTML = '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Until tip-off</span>';
}

render();
updateCountdown();
setInterval(() => { updateCountdown(); render(); }, 10000);
</script>
</body>
</html>
