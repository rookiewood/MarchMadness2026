<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March Madness Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8520A; --orange-dim: #B8400A; --gold: #F5C842;
    --dark: #0D0D0D; --dark2: #161616; --dark3: #1F1F1F; --dark4: #2A2A2A;
    --mid: #3A3A3A; --muted: #888; --light: #DEDEDE; --white: #F5F5F0;
    --green: #2ECC71; --red: #E74C3C; --blue: #3B8BEB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--white); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  /* SETUP SCREEN */
  .setup-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
  }
  .setup-box {
    background: var(--dark2); border: 1px solid var(--dark4); border-radius: 8px;
    padding: 2rem; max-width: 640px; width: 100%;
  }
  .setup-title {
    font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
  }
  .setup-title span { color: var(--orange); }
  .setup-sub { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
  .setup-step {
    background: var(--dark3); border: 1px solid var(--dark4); border-radius: 6px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .step-num {
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--orange); margin-bottom: 4px;
  }
  .step-text { font-size: 13px; color: var(--light); line-height: 1.6; }
  .step-text a { color: var(--orange); text-decoration: none; }
  .step-text a:hover { text-decoration: underline; }
  .step-text code {
    background: var(--dark4); border-radius: 3px; padding: 1px 6px;
    font-size: 12px; color: var(--gold); font-family: monospace;
  }
  .config-input {
    width: 100%; background: var(--dark4); border: 1px solid var(--mid);
    border-radius: 5px; padding: 10px 12px; font-size: 12px; color: var(--white);
    font-family: monospace; margin-top: 10px; outline: none;
    transition: border-color 0.15s; resize: vertical; min-height: 160px;
  }
  .config-input:focus { border-color: var(--orange); }
  .setup-btn {
    width: 100%; margin-top: 1rem; background: var(--orange); border: none; border-radius: 6px;
    color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 12px; cursor: pointer;
    transition: background 0.15s;
  }
  .setup-btn:hover { background: var(--orange-dim); }
  .setup-error {
    background: #2a1010; border: 1px solid #c0392b; border-radius: 5px;
    padding: 10px 14px; font-size: 13px; color: #e74c3c; margin-top: 10px; display: none;
  }

  /* MAIN APP */
  .app { display: none; }
  .site-header {
    background: var(--dark2); border-bottom: 1px solid var(--dark4);
    padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between;
    height: 56px; position: sticky; top: 0; z-index: 100;
  }
  .site-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; }
  .site-title span { color: var(--orange); }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
    display: inline-block; margin-right: 4px; transition: background 0.3s;
  }
  .sync-dot.live { background: var(--green); }
  .sync-dot.saving { background: var(--gold); }
  .sync-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

  .main { max-width: 1300px; margin: 0 auto; padding: 1.5rem 1rem; }

  .tabs { display: flex; gap: 2px; margin-bottom: 1.5rem; background: var(--dark2); border-radius: 6px; padding: 4px; }
  .tab-btn {
    flex: 1; background: transparent; border: none; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 8px; border-radius: 4px;
    cursor: pointer; transition: all 0.15s;
  }
  .tab-btn.active { background: var(--dark4); color: var(--white); }
  .tab-btn:hover:not(.active) { color: var(--light); }

  /* STANDINGS */
  .standings-card { background: var(--dark2); border: 1px solid var(--dark4); border-radius: 6px; overflow: hidden; margin-bottom: 1.5rem; }
  .standings-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; border-bottom: 1px solid var(--dark4); transition: background 0.1s;
  }
  .standings-row:last-child { border-bottom: none; }
  .standings-row:hover { background: var(--dark3); }
  .standings-row.leader { background: #1a1f14; }
  .rank { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--muted); width: 28px; text-align: center; }
  .rank.gold { color: var(--gold); }
  .rank.silver { color: #aaa; }
  .rank.bronze { color: #cd7f32; }
  .player-name-st { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; flex: 1; }
  .score-big { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; color: var(--gold); min-width: 64px; text-align: right; }
  .score-detail { font-size: 12px; color: var(--muted); text-align: right; min-width: 120px; }
  .leader-tag { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: var(--gold); color: #111; padding: 2px 8px; border-radius: 3px; }

  /* SCORE ENTRY */
  .round-block { background: var(--dark2); border: 1px solid var(--dark4); border-radius: 6px; overflow: hidden; }
  .round-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--dark3); border-bottom: 1px solid var(--dark4); }
  .round-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
  .round-pts-note { font-size: 12px; color: var(--muted); }
  .teams-entry-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  .team-entry-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid var(--dark4); border-right: 1px solid var(--dark4);
  }
  .seed-dot {
    width: 28px; height: 28px; border-radius: 50%; background: var(--dark4);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: var(--muted); flex-shrink: 0;
  }
  .te-info { flex: 1; min-width: 0; }
  .te-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .te-owner { font-size: 11px; }
  .wins-control { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .win-btn {
    width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--dark4);
    background: transparent; color: var(--muted); font-size: 16px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  }
  .win-btn:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
  .win-btn:disabled { opacity: 0.2; cursor: default; }
  .win-count { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; min-width: 18px; text-align: center; }
  .win-pts { font-size: 11px; color: var(--gold); min-width: 36px; text-align: right; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
  .elim-btn {
    background: transparent; border: 1px solid var(--dark4); border-radius: 4px;
    color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
    font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 3px 8px; cursor: pointer; flex-shrink: 0; transition: all 0.15s;
  }
  .elim-btn.is-out { border-color: #c0392b; color: #e74c3c; }
  .elim-btn:hover:not(.is-out) { border-color: #c0392b; color: #e74c3c; }

  /* PLAYER DETAIL */
  .player-detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .player-detail-card { background: var(--dark2); border: 1px solid var(--dark4); border-radius: 6px; overflow: hidden; }
  .pd-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--dark3); border-bottom: 1px solid var(--dark4); }
  .pd-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; flex: 1; }
  .pd-score { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--gold); }
  .pd-team-row { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid var(--dark4); font-size: 13px; }
  .pd-team-row:last-child { border-bottom: none; }
  .pd-team-row.eliminated { opacity: 0.35; }
  .pd-team-name { flex: 1; }
  .pd-team-wins { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--muted); }
  .pd-team-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--gold); min-width: 40px; text-align: right; }
  .pd-team-pts.zero { color: var(--muted); font-weight: 400; }

  @media (max-width: 600px) {
    .site-header { padding: 0 1rem; }
    .main { padding: 1rem 0.75rem; }
    .score-detail { display: none; }
  }
</style>
</head>
<body>
<!-- MAIN APP (hidden until config is set) -->
<div class="app" id="app">
  <header class="site-header">
    <div class="site-title">March <span>Madness</span> <span style="color:var(--muted);font-weight:400;font-size:16px">2026 Tracker</span></div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="sync-dot" id="sync-dot"></span>
      <span class="sync-label" id="sync-label">Connecting...</span>
    </div>
  </header>

  <div class="main">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('standings',this)">Standings</button>
      <button class="tab-btn" onclick="switchTab('scores',this)">Enter Scores</button>
      <button class="tab-btn" onclick="switchTab('players',this)">By Player</button>
    </div>
    <div id="tab-standings"></div>
    <div id="tab-scores" style="display:none"></div>
    <div id="tab-players" style="display:none"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── DATA ────────────────────────────────────────────────────────────────────
const PLAYERS = ["Robert","Ernesto","Efren","James","Antonio","Luis C","Arturo","Albert"];

const TEAMS = [

  {seed:6, name:"BYU",             region:"West",    owner:"Antonio"},

  {seed:1, name:"Florida",         region:"South",   owner:"Antonio"},
  {seed:15,name:"Tennessee St.",   region:"Midwest", owner:"Antonio"},
  {seed:11,name:"SMU/Miami (OH)",  region:"Midwest", owner:"Luis C"},

  {seed:9, name:"Utah St.",        region:"West",    owner:"Arturo"},
  {seed:7, name:"Saint Mary's",    region:"South",   owner:"Arturo"},
  {seed:3, name:"Illinois",        region:"South",   owner:"Arturo"},
  {seed:5, name:"Texas Tech",      region:"Midwest", owner:"Arturo"},
  {seed:14,name:"Kennesaw St.",    region:"West",    owner:"Arturo"},
  {seed:15,name:"Idaho",           region:"South",   owner:"Arturo"},
  {seed:11,name:"Texas/NC State",  region:"West",    owner:"Albert"},
  {seed:11,name:"VCU",             region:"South",   owner:"Albert"},
  {seed:7, name:"Kentucky",        region:"Midwest", owner:"Albert"},
  {seed:7, name:"Miami (FL)",      region:"West",    owner:"Albert"},
  {seed:3, name:"Michigan St.",    region:"East",    owner:"Albert"},
  {seed:3, name:"Virginia",        region:"Midwest", owner:"Albert"},
  {seed:14,name:"Wright St.",      region:"Midwest", owner:"Albert"},
  {seed:15,name:"Furman",          region:"East",    owner:"Albert"},
];

// ── STATE ───────────────────────────────────────────────────────────────────
let winsData = {};
let elimData = {};
let activeTab = 'standings';
let db = null;
let dbRef = null;
let isSaving = false;
const CONFIG_KEY = 'mm_firebase_config_2026';

function teamKey(t) { return `${t.region}_${t.seed}_${t.name.replace(/[^a-zA-Z0-9]/g,'_')}`; }
function getWins(t)  { return winsData[teamKey(t)] || 0; }
function isElim(t)   { return !!elimData[teamKey(t)]; }
function teamScore(t){ return t.seed * getWins(t); }
function playerScore(p){ return TEAMS.filter(t=>t.owner===p).reduce((s,t)=>s+teamScore(t),0); }
function playerTeams(p){ return TEAMS.filter(t=>t.owner===p); }
function playerMaxPossible(p){
  return TEAMS.filter(t=>t.owner===p&&!isElim(t)).reduce((s,t)=>s+t.seed*(getWins(t)+(6-getWins(t))),0);
}

// ── FIREBASE SETUP ──────────────────────────────────────────────────────────
function parseFirebaseConfig(raw) {
  // Strategy 1: straight JSON.parse after stripping JS wrapper
  try {
    const stripped = raw.replace(/^const\s+\w+\s*=\s*/, '').replace(/;\s*$/, '').trim();
    return JSON.parse(stripped);
  } catch(e) {}
  // Strategy 2: extract key: "value" pairs directly — handles unquoted keys,
  // single-quoted values, and condensed single-line format from Firebase console
  const config = {};
  const pattern = /([a-zA-Z0-9_]+)\s*:\s*["']([^"']+)["']/g;
  let match;
  while ((match = pattern.exec(raw)) !== null) {
    config[match[1]] = match[2];
  }
  if (Object.keys(config).length >= 4) return config;
  return null;
}

function saveConfig() {
  const raw = document.getElementById('firebase-config-input').value.trim();
  const errEl = document.getElementById('setup-error');
  errEl.style.display = 'none';
  let config;
  try { config = parseFirebaseConfig(raw); } catch(e) { config = null; }
  if (!config || Object.keys(config).length < 4) {
    errEl.textContent = 'Could not parse the config. Paste the full firebaseConfig object — keys and values should be wrapped in quotes.';
    errEl.style.display = 'block';
    return;
  }
  if (!config.databaseURL) {
    errEl.textContent = 'Missing databaseURL. Make sure your Firebase project has a Realtime Database created.';
    errEl.style.display = 'block';
    return;
  }
  localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
  initFirebase(config);
}

function initFirebase(config) {
  try {
    const firebaseConfig = {
    apiKey: "AIzaSyAenUZicTyg52LDQ1y-K1ngnvSbIFF7cdU",
    authDomain: "marchmadness2026-232c7.firebaseapp.com",
    databaseURL: "https://marchmadness2026-232c7-default-rtdb.firebaseio.com",
    projectId: "marchmadness2026-232c7",
    storageBucket: "marchmadness2026-232c7.firebasestorage.app",
    messagingSenderId: "105483230366",
    appId: "1:105483230366:web:2d0f21cc8fc737d7ae2f8f"
  };
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    dbRef = ref(db, 'tracker2026');
    setSyncStatus('connecting');
    // Listen for real-time updates
    onValue(dbRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        winsData = data.winsData || {};
        elimData = data.elimData || {};
      }
      setSyncStatus('live');
      showApp();
      render();
    }, (error) => {
      setSyncStatus('error');
      console.error('Firebase error:', error);
    });
  } catch(e) {
    document.getElementById('setup-error').textContent = 'Firebase init failed: ' + e.message;
    document.getElementById('setup-error').style.display = 'block';
    localStorage.removeItem(CONFIG_KEY);
  }
}

function showApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot) return;
  if (status === 'live')        { dot.className='sync-dot live'; lbl.textContent='Live'; }
  else if (status === 'saving') { dot.className='sync-dot saving'; lbl.textContent='Saving...'; }
  else if (status === 'connecting'){ dot.className='sync-dot'; lbl.textContent='Connecting...'; }
  else                          { dot.className='sync-dot'; lbl.textContent='Offline'; }
}

async function saveToFirebase() {
  if (!dbRef) return;
  setSyncStatus('saving');
  try {
    await set(dbRef, { winsData, elimData });
    setSyncStatus('live');
  } catch(e) {
    setSyncStatus('error');
    console.error('Save failed:', e);
  }
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  if (activeTab === 'standings') renderStandings();
  if (activeTab === 'scores')    renderScores();
  if (activeTab === 'players')   renderPlayers();
}

function renderStandings() {
  const el = document.getElementById('tab-standings');
  const sorted = [...PLAYERS].sort((a,b) => playerScore(b)-playerScore(a));
  const rows = sorted.map((player, i) => {
    const score = playerScore(player);
    const maxPoss = playerMaxPossible(player);
    const activeTeams = playerTeams(player).filter(t=>!isElim(t)).length;
    let rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    return `<div class="standings-row${i===0&&score>0?' leader':''}">
      <div class="rank ${rankClass}">${i+1}</div>
      <div class="player-name-st">${player}</div>
      ${i===0&&score>0?'<span class="leader-tag">Leading</span>':''}
      <div class="score-detail">${activeTeams} alive &nbsp;·&nbsp; max ${maxPoss} pts</div>
      <div class="score-big">${score}</div>
    </div>`;
  }).join('');

  const miniCards = [...PLAYERS].sort((a,b)=>playerScore(b)-playerScore(a)).map(player => {
    const pts = playerTeams(player).sort((a,b)=>teamScore(b)-teamScore(a));
    const rows = pts.map(t => {
      const w = getWins(t); const p = teamScore(t); const elim = isElim(t);
      return `<div class="pd-team-row${elim?' eliminated':''}">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);width:20px">${t.seed}</span>
        <span class="pd-team-name">${t.name}</span>
        <span class="pd-team-wins">${w}W</span>
        <span class="pd-team-pts ${p===0?'zero':''}">${p>0?p+' pts':'—'}</span>
      </div>`;
    }).join('');
    return `<div class="player-detail-card">
      <div class="pd-header"><div class="pd-name">${player}</div><div class="pd-score">${playerScore(player)} pts</div></div>
      ${rows}</div>`;
  }).join('');

  el.innerHTML = `
    <div class="standings-card">${rows}</div>
    <div style="font-size:12px;color:var(--muted);text-align:right;margin-bottom:1.5rem">
      Scoring: seed × wins &nbsp;·&nbsp; Max assumes all surviving teams win remaining games
    </div>
    <div class="player-detail-grid">${miniCards}</div>`;
}

function renderScores() {
  const el = document.getElementById('tab-scores');
  const sorted = [...TEAMS].sort((a,b) => {
    if (a.owner !== b.owner) return PLAYERS.indexOf(a.owner)-PLAYERS.indexOf(b.owner);
    return a.seed - b.seed;
  });

  const rows = sorted.map((t, i) => {
    const k = teamKey(t);
    const wins = getWins(t); const elim = isElim(t); const pts = teamScore(t);
    return `<div class="team-entry-row">
      <div class="seed-dot" style="${wins>0?'background:#1a2a1a;color:var(--green)':''}">${t.seed}</div>
      <div class="te-info">
        <div class="te-name">${t.name}</div>
        <div class="te-owner" style="color:${elim?'var(--muted)':'var(--orange)'}">${t.owner}${elim?' · OUT':''}</div>
      </div>
      <div class="wins-control">
        <button class="win-btn" data-key="${k}" data-delta="-1" ${wins===0?'disabled':''}>−</button>
        <span class="win-count" style="color:${wins>0?'var(--white)':'var(--muted)'}">${wins}</span>
        <button class="win-btn" data-key="${k}" data-delta="1" ${wins===6||elim?'disabled':''}>+</button>
      </div>
      <div class="win-pts">${pts>0?pts+' pts':''}</div>
      <button class="elim-btn${elim?' is-out':''}" data-key="${k}">${elim?'OUT':'Elim'}</button>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--muted)">Filter by player:</span>
      ${PLAYERS.map(p=>`<button onclick="filterByPlayer('${p}',this)"
        style="background:var(--dark3);border:1px solid var(--dark4);border-radius:4px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:5px 10px;cursor:pointer">${p}</button>`).join('')}
      <button onclick="filterByPlayer('all',this)"
        style="background:var(--dark3);border:1px solid var(--orange);border-radius:4px;color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:5px 10px;cursor:pointer" id="filter-all-btn">All</button>
    </div>
    <div class="round-block">
      <div class="round-header">
        <div class="round-title">All Teams — Win Tracker</div>
        <div class="round-pts-note">Score = seed × total wins &nbsp;·&nbsp; Max 6 wins (championship)</div>
      </div>
      <div class="teams-entry-grid" id="entry-grid">${rows}</div>
    </div>`;

  // Attach event listeners (avoids inline onclick issues with special chars)
  el.querySelectorAll('.win-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.key;
      const delta = parseInt(btn.dataset.delta);
      const t = TEAMS.find(t => teamKey(t) === k);
      if (!t) return;
      winsData[k] = Math.max(0, Math.min(6, (winsData[k]||0) + delta));
      if (winsData[k] === 0) delete winsData[k];
      saveToFirebase();
      render();
    });
  });

  el.querySelectorAll('.elim-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.key;
      elimData[k] = !elimData[k];
      if (!elimData[k]) delete elimData[k];
      saveToFirebase();
      render();
    });
  });
}

function renderPlayers() {
  const el = document.getElementById('tab-players');
  const sorted = [...PLAYERS].sort((a,b)=>playerScore(b)-playerScore(a));
  const cards = sorted.map((player, rank) => {
    const pts = playerTeams(player).sort((a,b)=>teamScore(b)-teamScore(a));
    const totalScore = playerScore(player);
    const rows = pts.map(t => {
      const wins = getWins(t); const ptsVal = teamScore(t); const elim = isElim(t);
      return `<div class="pd-team-row${elim?' eliminated':''}">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);width:20px;flex-shrink:0">${t.seed}</span>
        <span class="pd-team-name">${t.name} <span style="font-size:10px;color:var(--muted)">${t.region}</span></span>
        <span class="pd-team-wins">${wins>0?wins+'W':elim?'OUT':'—'}</span>
        <span class="pd-team-pts ${ptsVal===0?'zero':''}">${ptsVal>0?ptsVal+' pts':''}</span>
      </div>`;
    }).join('');
    let badge = '';
    if (rank===0) badge=`<span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;background:var(--gold);color:#111;padding:2px 8px;border-radius:3px">1st</span>`;
    else if (rank===1) badge=`<span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;background:#aaa;color:#111;padding:2px 8px;border-radius:3px">2nd</span>`;
    else if (rank===2) badge=`<span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;background:#cd7f32;color:#111;padding:2px 8px;border-radius:3px">3rd</span>`;
    return `<div class="player-detail-card">
      <div class="pd-header">
        <div><div style="font-size:11px;color:var(--muted);margin-bottom:2px">Pick #${PLAYERS.indexOf(player)+1}</div>
          <div class="pd-name">${player} ${badge}</div></div>
        <div style="text-align:right"><div class="pd-score">${totalScore} pts</div>
          <div style="font-size:11px;color:var(--muted)">max ${playerMaxPossible(player)}</div></div>
      </div>${rows}</div>`;
  }).join('');
  el.innerHTML = `<div class="player-detail-grid">${cards}</div>`;
}

window.filterByPlayer = function(player, btn) {
  const grid = document.getElementById('entry-grid');
  if (!grid) return;
  grid.querySelectorAll('.team-entry-row').forEach((row, i) => {
    if (player === 'all') { row.style.display = ''; }
    else { row.style.display = TEAMS[i] && TEAMS[i].owner === player ? '' : 'none'; }
  });
};

window.switchTab = function(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-standings').style.display = tab==='standings'?'':'none';
  document.getElementById('tab-scores').style.display    = tab==='scores'?'':'none';
  document.getElementById('tab-players').style.display   = tab==='players'?'':'none';
  render();
};

window.saveConfig = saveConfig;

// ── BOOT ────────────────────────────────────────────────────────────────────
const saved = localStorage.getItem(CONFIG_KEY);
if (saved) {
  try { initFirebase(JSON.parse(saved)); }
  catch(e) { localStorage.removeItem(CONFIG_KEY); }
}
</script>
</body>
</html>
